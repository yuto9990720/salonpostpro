<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご登録ありがとうございます | SalonPostPro</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FBF9EE;--tan:#D5BFA6;--caramel:#BC9076;--choc:#4B2D15;
  --latin:'Bricolage Grotesque',sans-serif;--jp:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
}
body{
  background:var(--cream);color:var(--choc);font-family:var(--jp);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  max-width:480px;text-align:center;
  background:#fff;border:1.5px solid var(--choc);border-radius:32px;
  padding:64px 44px;
}
.icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--caramel);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 32px;
}
.icon svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:3}
h1{
  font-weight:900;font-size:26px;line-height:1.5;margin-bottom:16px;
}
p{font-size:14px;font-weight:500;color:var(--choc);opacity:.75;line-height:1.9;margin-bottom:36px}
a{
  display:inline-block;background:var(--choc);color:var(--cream);
  padding:16px 40px;border-radius:999px;text-decoration:none;
  font-size:13px;font-weight:700;letter-spacing:0.02em;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
  <h1>ご登録ありがとうございます</h1>
  <p>Proプランへのお申し込みが完了しました。LINEにて登録完了のご案内をお送りしていますので、ご確認ください。</p>
  <a href="https://salonpostpro.com">トップページに戻る</a>
</div>
</body>
</html>
